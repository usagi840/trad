<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Solo</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">
  
  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #413d3d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas { border: none; display: block; }

    /* Les icônes en haut */
    .icon { cursor:pointer; width:105px; position:fixed; top:10px; }
    .icon.home { left:10px; }
    .icon.retour { left:125px; }
    .icon.refresh { right:10px; }

    /* Bouton plein écran */
    #btn-fullscreen {
      position: fixed;
      bottom: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      background: rgba(41, 21, 21, 0.85);
      border: 2px solid #8b5c5c;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      z-index: 1000;
    }
    #btn-fullscreen:hover {
      background: rgba(80, 40, 40, 0.95);
      transform: scale(1.08);
    }
    #btn-fullscreen:active {
      transform: scale(0.95);
    }
    #btn-fullscreen svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #e8c8a0;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #mobile-controls {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 180px;
  pointer-events: none;
  z-index: 500;
}
#joystick-zone {
  position: absolute;
  left: 0; top: 0;
  width: 50%; height: 100%;
  pointer-events: all;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
.joy-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2.5px solid rgba(255,255,255,0.35);
  display: flex; align-items: center; justify-content: center;
  touch-action: none;
}
.joy-btn.pressed { background: rgba(255,255,255,0.35); }
.joy-btn svg { width: 36px; height: 36px; fill: rgba(255,255,255,0.8); }
#jump-zone {
  position: absolute;
  right: 0; top: 0;
  width: 50%; height: 100%;
  pointer-events: all;
  display: flex; align-items: center; justify-content: center;
}
#jump-btn {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: rgba(255,200,80,0.18);
  border: 2.5px solid rgba(255,200,80,0.5);
  font-size: 36px;
  display: flex; align-items: center; justify-content: center;
  touch-action: none;
}
#jump-btn.pressed { background: rgba(255,200,80,0.4); }
@media (pointer: coarse) {
  #mobile-controls { display: block; }
}
  </style>
</head>
<body>

  <!-- Bouton plein écran -->
  <button id="btn-fullscreen" title="Plein écran" onclick="toggleFullscreen()">
    <!-- Icône "agrandir" (4 coins) -->
    <svg id="icon-expand" viewBox="0 0 24 24">
      <polyline points="15 3 21 3 21 9"/>
      <polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/>
      <line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
    <!-- Icône "réduire" (masquée par défaut) -->
    <svg id="icon-compress" viewBox="0 0 24 24" style="display:none;">
      <polyline points="4 14 10 14 10 20"/>
      <polyline points="20 10 14 10 14 4"/>
      <line x1="10" y1="14" x2="3" y2="21"/>
      <line x1="21" y1="3" x2="14" y2="10"/>
    </svg>
  </button>

  <div id="mobile-controls">
  <div id="joystick-zone">
    <div class="joy-btn" id="btn-left"
      ontouchstart="mLeft(true)" ontouchend="mLeft(false)" ontouchcancel="mLeft(false)">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="joy-btn" id="btn-right"
      ontouchstart="mRight(true)" ontouchend="mRight(false)" ontouchcancel="mRight(false)">
      <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>
  <div id="jump-zone">
    <div id="jump-btn"
      ontouchstart="mJump(true)" ontouchend="mJump(false)" ontouchcancel="mJump(false)">⬆</div>
  </div>
  </div>

  <div id="game-wrapper"></div>

<script>
  // ==== Plein écran ====
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().then(() => {
        document.getElementById('icon-expand').style.display = 'none';
        document.getElementById('icon-compress').style.display = 'block';
      }).catch(err => console.warn('Fullscreen refusé :', err));
    } else {
      document.exitFullscreen().then(() => {
        document.getElementById('icon-expand').style.display = 'block';
        document.getElementById('icon-compress').style.display = 'none';
      });
    }
  }

  // Sync icône si l'utilisateur quitte le plein écran avec Échap
  document.addEventListener('fullscreenchange', () => {
    const isFS = !!document.fullscreenElement;
    document.getElementById('icon-expand').style.display  = isFS ? 'none'  : 'block';
    document.getElementById('icon-compress').style.display = isFS ? 'block' : 'none';
  });

  // ==== Firebase ====
  firebase.initializeApp({
    apiKey: "AIzaSyBnQb5b5h62Jl4WeiKEBMeEmivbOK-B70k",
    authDomain: "bombgo-classement.firebaseapp.com",
    projectId: "bombgo-classement",
    appId: "1:113313571513:web:73863b02df8193606ef168"
  });
  const db = firebase.firestore();

  // ==== Device ID pour score unique ====
  let deviceId = localStorage.getItem("deviceId");
  if(!deviceId){ deviceId = crypto.randomUUID(); localStorage.setItem("deviceId", deviceId); }

  let playerNickname = localStorage.getItem("playerNickname") || "player";

  // ==== Variables globales ====
  var player, cursors, stars, bombs, platforms;
  var score = 0, scoreText;
  var lives = 3, lifeIcons = [];
  var gameOver = false;
  var currentLevel = 0;
  var platformsArray = [];
  var tremplin = null;

  // ==== Layout des niveaux ====
  var platformLayouts = [
    [{x:600,y:400},{x:50,y:250},{x:750,y:220}],
    [{x:150,y:350},{x:400,y:200},{x:650,y:300},{x:400,y:470}],
    [{x:700,y:250},{x:80,y:150},{x:500,y:400}],
    [{x:300,y:420},{x:40,y:200},{x:650,y:120},{x:400,y:300}],
    [{x:200,y:380},{x:40,y:140},{x:600,y:240},{x:350,y:100}],
    [{x:200,y:150},{x:500,y:310},{x:700,y:180},{x:350,y:460}],
    [{x:100,y:380},{x:300,y:250},{x:500,y:150},{x:700,y:250}],
    [{x:50,y:380},{x:250,y:200},{x:450,y:100},{x:650,y:200}],
    [{x:400,y:380},{x:200,y:250},{x:600,y:150}],
    [{x:100,y:500},{x:300,y:350},{x:500,y:200},{x:700,y:100}]
  ];

  // ==== Config Phaser ====
  var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: { default: 'arcade', arcade: { gravity:{y:300}, debug:false } },
    scene: { preload, create, update }
  };
  new Phaser.Game(config);

  // Redimensionne le canvas pour remplir l'écran sans déformer (ratio 800:600)
  function resizeCanvas() {
    var canvas = document.querySelector('canvas');
    if (!canvas) return;
    var scaleX = window.innerWidth  / 800;
    var scaleY = window.innerHeight / 600;
    var scale  = Math.min(scaleX, scaleY);
    canvas.style.width  = (800 * scale) + 'px';
    canvas.style.height = (600 * scale) + 'px';
  }
  // On attend que Phaser ait créé le canvas puis on redimensionne
  setTimeout(resizeCanvas, 300);
  window.addEventListener('resize', resizeCanvas);

  var mobileKeys = { left: false, right: false, up: false };

function mLeft(v)  { mobileKeys.left = v;  document.getElementById('btn-left').classList.toggle('pressed', v); }
function mRight(v) { mobileKeys.right = v; document.getElementById('btn-right').classList.toggle('pressed', v); }
function mJump(v)  { mobileKeys.up = v;    document.getElementById('jump-btn').classList.toggle('pressed', v); }

  function preload(){
    this.load.image('sky','assets/sky.png');
    this.load.image('ground','assets/platform.png');
    this.load.image('star','assets/piece.png');
    this.load.image('bomb','assets/bombe.png');
    this.load.image('vie','assets/vie1.png');
    this.load.image('novie','assets/vie2.png');
    this.load.image('tremplin','assets/tremplin.png');
    const selectedChar = localStorage.getItem('selectedCharacter') || '1';
    this.load.spritesheet('dude',`assets/personnageframe${selectedChar}.png`,{frameWidth:320, frameHeight:480});
  }

  function create(){
    this.add.image(400,300,'sky');
    scoreText = this.add.text(16,16,'Score: 0',{fontSize:'32px',fill:'#000'});

    for(let i=0;i<lives;i++) lifeIcons.push(this.add.image(40+i*45,70,'vie').setScale(0.02));

    platforms = this.physics.add.staticGroup();
    platforms.create(400,568,'ground').setScale(2).refreshBody();
    createPlatformsForLevel(currentLevel);

    player = this.physics.add.sprite(100,450,'dude').setScale(0.125).setBounce(0.2).setCollideWorldBounds(true);
    this.anims.create({key:'left', frames:this.anims.generateFrameNumbers('dude',{start:0,end:3}), frameRate:10, repeat:-1});
    this.anims.create({key:'turn', frames:[{key:'dude',frame:4}], frameRate:20});
    this.anims.create({key:'right', frames:this.anims.generateFrameNumbers('dude',{start:5,end:8}), frameRate:10, repeat:-1});

    cursors = this.input.keyboard.createCursorKeys();

    stars = this.physics.add.group({key:'star', repeat:11, setXY:{x:12,y:0,stepX:70}});
    stars.children.iterate(c => { c.setBounceY(Phaser.Math.FloatBetween(0.4,0.8)); c.setScale(0.015); });

    bombs = this.physics.add.group();

    this.physics.add.collider(player, platforms);
    this.physics.add.collider(stars, platforms);
    this.physics.add.collider(bombs, platforms);
    this.physics.add.overlap(player, stars, collectStar, null, this);
    this.physics.add.collider(player, bombs, hitBomb, null, this);
  }

function update(){
  if(gameOver) return;
  var goLeft  = cursors.left.isDown  || mobileKeys.left;
  var goRight = cursors.right.isDown || mobileKeys.right;
  var goUp    = cursors.up.isDown    || mobileKeys.up;

  if(goLeft)       { player.setVelocityX(-160); player.anims.play('left', true); }
  else if(goRight) { player.setVelocityX(160);  player.anims.play('right', true); }
  else             { player.setVelocityX(0);     player.anims.play('turn'); }

  if(goUp && player.body.touching.down) player.setVelocityY(-330);
}

  function collectStar(player, star){
    star.disableBody(true,true);
    score += 10;
    scoreText.setText('Score: '+score);
    if(stars.countActive(true)===0){
      changeLevel();
      stars.children.iterate(c => c.enableBody(true,c.x,0,true,true));
      let x = (player.x<400)?Phaser.Math.Between(400,800):Phaser.Math.Between(0,400);
      let bomb = bombs.create(x,16,'bomb').setScale(0.015);
      bomb.body.setSize(bomb.width*0.015, bomb.height*0.015);
      bomb.body.setOffset(bomb.width*0.015, bomb.height*0.015);
      bomb.setBounce(1).setCollideWorldBounds(true).setVelocity(Phaser.Math.Between(-200,200),20);
    }
  }

  function hitBomb(player, bomb){
    bomb.disableBody(true,true);
    lives--;
    if(lives>=0) lifeIcons[lives].setTexture('novie').setScale(0.02);
    if(lives<=0 && !gameOver){
      gameOver=true;
      this.physics.pause();
      player.setTint(0xff0000); player.anims.play('turn');
      saveScore();
    }
  }

  function saveScore() {
    const ref = db.collection("scores").doc(deviceId);
    ref.get().then(doc => {
      if (!doc.exists) {
        ref.set({ pseudo: playerNickname, score: score, date: Date.now() });
        return;
      }
      const oldData = doc.data();
      if (score > oldData.score) {
        ref.set({ pseudo: playerNickname, score: score, date: Date.now() });
      } else if (playerNickname !== oldData.pseudo) {
        ref.update({ pseudo: playerNickname });
      }
    }).catch(err => console.error("Erreur saveScore:", err));
  }

  function createPlatformsForLevel(level){
    platformsArray.forEach(p=>p.destroy());
    platformsArray=[];
    platformLayouts[level].forEach(pos=>platformsArray.push(platforms.create(pos.x,pos.y,'ground')));
  }

  function changeLevel(){
    currentLevel = (currentLevel+1)%platformLayouts.length;
    createPlatformsForLevel(currentLevel);
  }

</script>
</body>
</html>
