<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Décodeur de messages</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --border: #e2ddd8;
      --text: #1a1714;
      --muted: #8a8179;
      --accent: #c8402a;
      --accent-light: #fdf0ed;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.15;
      color: var(--text);
    }

    h1 em { font-style: italic; color: var(--accent); }

    header p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
      max-width: 380px;
      margin-inline: auto;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 620px;
      animation: fadeUp 0.6s ease 0.1s both;
      box-shadow: 0 2px 20px rgba(0,0,0,0.04);
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .context-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.18s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

    textarea {
      width: 100%;
      min-height: 130px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: #bbb; }

    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      background: #a8321f;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(200,64,42,0.3);
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Results */
    #resultArea {
      width: 100%;
      max-width: 620px;
      margin-top: 24px;
    }

    .result-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
      animation: fadeUp 0.4s ease both;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 14px;
    }

    .tag.red   { background: var(--accent-light); color: var(--accent); }
    .tag.blue  { background: #edf2ff; color: #3455d1; }
    .tag.green { background: #edfaf3; color: #1a7a4a; }
    .tag.orange{ background: #fff7ed; color: #c2610a; }

    .result-section p {
      font-size: 16px;
      line-height: 1.65;
      color: var(--text);
    }

    .divider { height: 1px; background: var(--border); margin: 18px 0; }

    .original-bubble {
      background: var(--bg);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
      border-left: 3px solid var(--border);
      font-style: italic;
    }

    .tone-bar { display: flex; gap: 6px; margin: 10px 0 8px; }
    .tone-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s ease;
    }
    .tone-dot.active { background: var(--accent); }

    .tone-label { font-size: 13px; color: var(--muted); }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      padding: 32px 0;
    }

    .dot-pulse { display: flex; gap: 5px; }
    .dot-pulse span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Analyse de message</div>
  <h1>Ce qu'ils voulaient<br/><em>vraiment</em> dire</h1>
  <p>Colle un message reçu. On te dit ce qui se cache vraiment derrière les mots.</p>
</header>

<div class="card">
  <span class="field-label">Contexte de la relation</span>
  <div class="context-row" id="contextChips">
    <button class="chip active" data-ctx="ami">👥 Ami·e</button>
    <button class="chip" data-ctx="amoureux">💌 Amoureux·se</button>
    <button class="chip" data-ctx="famille">👨‍👩‍👧 Famille</button>
    <button class="chip" data-ctx="collègue">💼 Collègue</button>
    <button class="chip" data-ctx="inconnu">🤷 Inconnu·e</button>
  </div>

  <span class="field-label">Le message reçu</span>
  <textarea id="msgInput" placeholder="Ex : « C'est bon, fais comme tu veux. »&#10;Ex : « Ok. »&#10;Ex : « T'inquiète, j'ai compris. »&#10;Ex : « Laisse tomber. »"></textarea>

  <button class="btn" id="analyzeBtn" onclick="analyze()">
    🔍 Décoder ce message
  </button>
</div>

<div id="resultArea"></div>

<script>
  // ── Contexte sélectionné ──────────────────────────────────────
  let selectedCtx = "ami";

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedCtx = chip.dataset.ctx;
    });
  });

  // ── Base de patterns ──────────────────────────────────────────
  const patterns = [
    {
      triggers: ["c'est bon, fais comme tu veux", "fais comme tu veux", "comme tu veux"],
      vrai_sens: "Ce n'est absolument pas bon. La personne est blessée ou frustrée mais refuse de l'avouer directement.",
      emotion: "😤 Frustration refoulée",
      sous_entendu: "Je veux que tu insistes et que tu te soucies vraiment de mon avis.",
      conseil: "Ne prends pas ça au pied de la lettre. Demande-lui franchement comment elle se sent.",
      tension: 4,
    },
    {
      triggers: ["ok.", "ok .", "oki.", "okay."],
      vrai_sens: "Ce point final unique dit tout : elle n'est pas ok. Ce 'ok' sec et froid cache une déception.",
      emotion: "❄️ Froideur distante",
      sous_entendu: "Je suis déçu·e et je n'ai plus envie d'en discuter.",
      conseil: "Relance la conversation. Un 'ok.' seul, c'est rarement bon signe.",
      tension: 4,
    },
    {
      triggers: ["ok", "okay", "oki", "d'acc", "d'accord"],
      vrai_sens: "Réponse neutre, difficile à interpréter sans le ton. Peut être sincère ou distant selon le contexte.",
      emotion: "😐 Réponse automatique",
      sous_entendu: "Je prends acte mais je ne suis pas forcément enthousiaste.",
      conseil: "Si le 'ok' te semble froid ou court, relance avec une question ouverte.",
      tension: 2,
    },
    {
      triggers: ["t'inquiète j'ai compris", "j'ai compris", "c'est bon j'ai compris"],
      vrai_sens: "Elle a compris, mais n'est pas d'accord. Elle coupe court pour éviter d'aller plus loin.",
      emotion: "🙄 Agacement discret",
      sous_entendu: "Arrête d'expliquer. Je lâche l'affaire mais je ne suis pas convaincu·e.",
      conseil: "Fais une pause. Laisse souffler avant de reprendre la discussion.",
      tension: 3,
    },
    {
      triggers: ["laisse tomber", "oublie", "c'est rien", "non c'est rien", "non rien"],
      vrai_sens: "Ce n'est clairement pas rien. Elle voulait en parler mais a l'impression que tu ne t'y intéresses pas.",
      emotion: "😔 Déception silencieuse",
      sous_entendu: "Je voulais me confier mais tu n'as pas l'air de vouloir écouter.",
      conseil: "Insiste doucement : 'Non dis-moi, j'ai le temps.' Elle attend que tu la relances.",
      tension: 3,
    },
    {
      triggers: ["si tu veux", "c'est toi qui vois", "comme tu veux", "peu importe"],
      vrai_sens: "Elle a une préférence mais attend que tu la devines ou que tu proposes quelque chose.",
      emotion: "🤐 Passivité stratégique",
      sous_entendu: "Je veux que tu prennes l'initiative mais je ne vais pas te le dire.",
      conseil: "Propose une option concrète et demande son vrai avis : 'Et toi t'aurais voulu quoi ?'",
      tension: 2,
    },
    {
      triggers: ["ça va", "bien", "nickel", "impeccable", "tout va bien"],
      vrai_sens: "Peut-être sincère, peut-être pas. Sans contexte, c'est une réponse réflexe.",
      emotion: "😐 Réponse automatique",
      sous_entendu: "Je réponds par habitude. Si tu veux vraiment savoir, pose une vraie question.",
      conseil: "Creuse un peu : 'Vraiment ? T'as l'air bizarre, qu'est-ce qui se passe ?'",
      tension: 1,
    },
    {
      triggers: ["t'as l'air occupé", "je veux pas te déranger", "c'est pas grave", "dérange toi pas"],
      vrai_sens: "Elle a besoin de toi mais n'ose pas le demander directement.",
      emotion: "🥺 Besoin d'attention masqué",
      sous_entendu: "J'aimerais que tu me dises que tu as du temps pour moi.",
      conseil: "Réponds immédiatement que tu es disponible. Elle attend juste ce signal.",
      tension: 2,
    },
    {
      triggers: ["intéressant", "c'est intéressant", "sympa", "cool"],
      vrai_sens: "Elle ne partage pas ton enthousiasme mais reste polie pour ne pas vexer.",
      emotion: "😑 Politesse froide",
      sous_entendu: "Je ne suis pas vraiment convaincu·e mais je ne veux pas te vexer.",
      conseil: "Demande franchement son avis : elle attend que tu lui donnes la permission de critiquer.",
      tension: 2,
    },
    {
      triggers: ["on verra", "peut-être", "je sais pas", "à voir"],
      vrai_sens: "C'est probablement non, mais elle n'assume pas de le dire clairement.",
      emotion: "😬 Hésitation ou refus déguisé",
      sous_entendu: "J'évite de dire non pour ne pas créer de conflit.",
      conseil: "Donne-lui une porte de sortie : 'Dis-moi franchement si t'as pas envie, c'est ok.'",
      tension: 2,
    },
    {
      triggers: ["non c'est bon", "non je gère", "j'ai pas besoin d'aide", "je gère"],
      vrai_sens: "Elle galère mais son orgueil l'empêche de demander de l'aide.",
      emotion: "💪 Orgueil blessé",
      sous_entendu: "J'aurais aimé que tu proposes sans que j'aie à demander.",
      conseil: "Propose une aide concrète sans demander : 'Je m'en occupe, pas de discussion.'",
      tension: 2,
    },
    {
      triggers: ["c'est toujours pareil", "comme d'hab", "comme d'habitude", "évidemment"],
      vrai_sens: "Ce n'est pas juste ce moment qui l'agace — c'est un sentiment qui dure depuis un moment.",
      emotion: "😩 Lassitude accumulée",
      sous_entendu: "Je suis épuisé·e par ce schéma qui se répète et tu ne t'en rends pas compte.",
      conseil: "Prends ça au sérieux. C'est le signal d'un problème plus profond qui mérite une vraie conversation.",
      tension: 5,
    },
    {
      triggers: ["tu fais ce que tu veux", "libre à toi", "c'est ta vie"],
      vrai_sens: "Elle désapprouve ta décision mais ne veut pas avoir l'air de te contrôler.",
      emotion: "😒 Désapprobation voilée",
      sous_entendu: "Je ne suis pas d'accord mais je refuse d'assumer cette position.",
      conseil: "Demande-lui directement son opinion : 'Mais toi, qu'est-ce que tu en penses vraiment ?'",
      tension: 3,
    },
    {
      triggers: ["non non vas-y", "vas-y toi", "non vas-y"],
      vrai_sens: "Elle voulait y aller ou faire quelque chose, mais attend que tu insistes.",
      emotion: "🙈 Fausse modestie",
      sous_entendu: "Convaincs-moi d'y aller, j'attends juste qu'on me le propose vraiment.",
      conseil: "Insiste une deuxième fois avec conviction. Elle dit non mais pense oui.",
      tension: 1,
    },
    {
      triggers: ["haha", "lol", "mdr", "😂", "🙃"],
      vrai_sens: "L'humour peut masquer un malaise. Selon le contexte, ce peut être sincère ou défensif.",
      emotion: "😅 Humour défensif possible",
      sous_entendu: "Je ris pour dédramatiser ou pour éviter d'aborder quelque chose de sérieux.",
      conseil: "Si la situation était sérieuse avant ce message, ne laisse pas l'humour noyer la vraie conversation.",
      tension: 1,
    },
  ];

  // ── Analyse ───────────────────────────────────────────────────
  function analyzeMessage(text, context) {
    const lower = text.toLowerCase().trim();

    for (const p of patterns) {
      if (p.triggers.some(t => lower.includes(t))) {
        let conseil = p.conseil;
        if (context === "amoureux" && p.tension >= 3) {
          conseil += " Dans une relation amoureuse, ce type de message mérite une vraie conversation en face à face.";
        } else if (context === "collègue" && p.tension >= 4) {
          conseil += " En contexte pro, reste factuel et ne prends pas ça trop personnellement.";
        } else if (context === "famille" && p.tension >= 4) {
          conseil += " En famille, ces non-dits peuvent s'accumuler — mieux vaut crever l'abcès.";
        }
        return { ...p, conseil };
      }
    }

    // Analyse générique si aucun pattern trouvé
    const words   = lower.split(/\s+/).length;
    const hasPoint = lower.endsWith(".");
    const hasExclaim = text.includes("!");
    const hasSmiley  = /[:;]-?[\)\(DOPp]|[\u{1F600}-\u{1F64F}]/u.test(text);
    const hasQuestion = text.includes("?");

    if (words <= 3 && hasPoint && !hasSmiley && !hasExclaim) {
      return {
        vrai_sens: "Ce message court et sec laisse entrevoir une certaine distance ou froideur.",
        emotion: "❄️ Distance émotionnelle",
        sous_entendu: "Je réponds le minimum. Je ne suis pas entièrement à l'aise.",
        conseil: "Essaie de réchauffer l'échange avec une question ouverte et sincère.",
        tension: 3,
      };
    }

    if (hasExclaim && hasSmiley) {
      return {
        vrai_sens: "Le message paraît positif et enthousiaste — pas de sous-entendu négatif détecté.",
        emotion: "😊 Bonne humeur sincère",
        sous_entendu: "Ce que tu vois est probablement ce qu'il y a. Aucun double sens apparent.",
        conseil: "Réponds avec la même énergie, ça a l'air de bien se passer !",
        tension: 1,
      };
    }

    if (hasQuestion) {
      return {
        vrai_sens: "Une question directe — plutôt bon signe en termes de communication.",
        emotion: "🤔 Curiosité ou demande",
        sous_entendu: "La personne veut une réponse claire. Elle attend quelque chose de toi.",
        conseil: "Réponds franchement et sans détour. La clarté est appréciée ici.",
        tension: 1,
      };
    }

    return {
      vrai_sens: "Pas de sous-entendu évident détecté. Le message semble relativement neutre.",
      emotion: "😐 Ton neutre",
      sous_entendu: "Pas de signal d'alarme flagrant, mais le contexte et le ton comptent beaucoup.",
      conseil: "Si quelque chose te chiffonne dans ce message, fais confiance à ton instinct et demande directement.",
      tension: 2,
    };
  }

  const tensionLabels = [
    "", 
    "Tout va bien, aucun drama 👌",
    "Légèrement tendu, à surveiller 👀",
    "Clairement mal à l'aise 😬",
    "Situation tendue, attention ⚠️",
    "C'est chaud, agis vite 🔥"
  ];

  // ── Affichage ─────────────────────────────────────────────────
  function analyze() {
    const msg = document.getElementById('msgInput').value.trim();
    if (!msg) return;

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="dot-pulse"><span></span><span></span><span></span></span>&nbsp; Lecture entre les lignes…';

    document.getElementById('resultArea').innerHTML = `
      <div class="result-section">
        <div class="loading">
          <div class="dot-pulse"><span></span><span></span><span></span></div>
          Analyse en cours…
        </div>
      </div>`;

    setTimeout(() => {
      const result = analyzeMessage(msg, selectedCtx);
      renderResult(msg, result);
      btn.disabled = false;
      btn.innerHTML = '🔍 Décoder ce message';
    }, 1000);
  }

  function renderResult(original, d) {
    const dots = Array.from({length: 5}, (_, i) =>
      `<div class="tone-dot ${i < d.tension ? 'active' : ''}"></div>`
    ).join('');

    document.getElementById('resultArea').innerHTML = `
      <div class="result-section">
        <div class="original-bubble">"${escapeHtml(original)}"</div>
        <div class="tag red">💬 Ce qu'il/elle voulait vraiment dire</div>
        <p>${d.vrai_sens}</p>
      </div>

      <div class="result-section" style="animation-delay:0.1s">
        <div class="tag orange">🎭 Émotion cachée</div>
        <p>${d.emotion}</p>
        <div class="divider"></div>
        <div class="tag blue">🔍 Sous-entendu</div>
        <p>${d.sous_entendu}</p>
      </div>

      <div class="result-section" style="animation-delay:0.2s">
        <div class="tag green">✅ Quoi faire</div>
        <p>${d.conseil}</p>
        <div class="divider"></div>
        <span class="field-label">Niveau de tension</span>
        <div class="tone-bar">${dots}</div>
        <div class="tone-label">${tensionLabels[d.tension]}</div>
      </div>
    `;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Soumettre avec Entrée (Ctrl+Entrée)
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyze();
    });
  });
</script>

</body>
</html>
