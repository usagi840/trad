<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #333;
      color: white;
      font-family: Arial;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ── CÔTÉ GAUCHE ── */
    .left-panel {
      width: 60%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .top-bar img {
      width: 90px;
      cursor: pointer;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      justify-content: center;
    }

    .buttons img {
      width: 100%;
      max-height: 18vh;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
    }

    .buttons img:hover {
      transform: scale(1.03);
      filter: brightness(1.15);
    }

    /* ── CÔTÉ DROIT ── */
    .right-panel {
      width: 40%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 12px 12px 0 0;
      gap: 0;
      position: relative;
    }

    .personnage-wrap {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .personnage-wrap img {
      max-width: 75%;
      max-height: 65vh;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .ile-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .ile-wrap img {
      width: 90%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    #btn-fullscreen {
  position: fixed;
  top: 14px; right: 14px;
  width: 44px; height: 44px;
  background: rgba(41,21,21,0.85);
  border: 2px solid #8b5c5c;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
#btn-fullscreen svg {
  width: 22px; height: 22px;
  fill: none; stroke: #e8c8a0;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
  </style>
</head>

<body>

  <div class="layout">

    <!-- GAUCHE -->
    <div class="left-panel">
      <div class="top-bar">
        <img src="assets/logoretour.png" onclick="window.location.href='./index.html'">
        <img src="assets/logoparametre.png" onclick="window.location.href='./parametre.html'">
      </div>

      <div class="buttons">
        <img src="assets/logosolo.png" onclick="window.location.href='solofe.html'">
        <img src="assets/logoniveaux.png" onclick="window.location.href='./niv1a10.html'">
        <img src="assets/logoediteur.png" onclick="window.location.href='editeur.html'">
        <img src="assets/logomesniveaux.png" onclick="window.location.href='mesniveaux.html'">
      </div>
    </div>

    <!-- DROITE -->
    <div class="right-panel">
      <div class="personnage-wrap">
        <img id="perso" src="assets/personnage1.png" alt="Personnage">
      </div>
      <div class="ile-wrap">
        <img src="assets/platformehobby.png" alt="Île">
      </div>
    </div>

    <button id="btn-fullscreen" onclick="toggleFullscreen()">
  <svg id="icon-expand" viewBox="0 0 24 24">
    <polyline points="15 3 21 3 21 9"/>
    <polyline points="9 21 3 21 3 15"/>
    <line x1="21" y1="3" x2="14" y2="10"/>
    <line x1="3" y1="21" x2="10" y2="14"/>
  </svg>
  <svg id="icon-compress" viewBox="0 0 24 24" style="display:none;">
    <polyline points="4 14 10 14 10 20"/>
    <polyline points="20 10 14 10 14 4"/>
    <line x1="10" y1="14" x2="3" y2="21"/>
    <line x1="21" y1="3" x2="14" y2="10"/>
  </svg>
    </button>

  </div>

  <script>
    // Charger le personnage sélectionné
    const selectedChar = localStorage.getItem('selectedCharacter') || '1';
    document.getElementById('perso').src = `assets/personnage${selectedChar}.png`;

    function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const isFS = !!document.fullscreenElement;
  document.getElementById('icon-expand').style.display   = isFS ? 'none'  : 'block';
  document.getElementById('icon-compress').style.display = isFS ? 'block' : 'none';
});
  </script>

</body>

</html>
