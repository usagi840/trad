<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bombgo</title>
  <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #333;
      color: white;
      font-family: Arial;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

.layout {
  display: flex;
  width: 100%;
  height: 100%;
  position: relative; /* Ajouté pour verrouiller le positionnement absolu */
}

    /* ───────── GAUCHE ───────── */

    .left-panel {
      width: 60%;
      height: 100%;
      position: relative;
      padding: 0; /* important pour éviter décalage */
    }

    /* BOUTON RETOUR */
    .btn-retour,
.btn-parametre {
  position: fixed; /* Utilise l'écran entier comme repère */
  top: 0;
  right: 12px;
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 1000;
    }

    .btn-retour {
      left: 12px;
    }

    .btn-parametre {
      right: 12px;
    }

    .btn-retour img,
    .btn-parametre img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
      display: block;
    }

    /* BOUTONS CENTRAUX */
    .buttons {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding: 12px;
    }

    .buttons img {
      width: 100%;
      max-height: 18vh;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease;
    }

    .buttons img:hover {
      transform: scale(1.03);
      filter: brightness(1.15);
    }

    /* ───────── DROITE ───────── */

    .right-panel {
      width: 40%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 12px 12px 0 0;
      position: relative;
    }

    .personnage-wrap {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .personnage-wrap img {
      max-width: 75%;
      max-height: 65vh;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .ile-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .ile-wrap img {
      width: 90%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="layout">

  <div class="left-panel">
    <div class="btn-retour">
      <img src="assets/logoretour.png" onclick="window.location.href='./index.html'">
    </div>

    <div class="buttons">
      </div>
  </div>

  <div class="right-panel">
    </div>

  <div class="btn-parametre">
    <img src="assets/logoparametre.png" onclick="window.location.href='./parametre.html'">
  </div>

</div>

      <div class="buttons">
        <img src="assets/logosolo.png"
             onclick="window.location.href='solo.html'">

        <img src="assets/logoniveaux.png"
             onclick="window.location.href='./niv1a10.html'">

        <img src="assets/logoediteur.png"
             onclick="window.location.href='editeur.html'">

        <img src="assets/logomesniveaux.png"
             onclick="window.location.href='mesniveaux.html'">
      </div>

    </div>

    <!-- DROITE -->
    <div class="right-panel">

      <div class="personnage-wrap">
        <img id="perso"
             src="assets/personnage1.png"
             alt="Personnage">
      </div>

      <div class="ile-wrap">
        <img src="assets/platformehobby.png"
             alt="Île">
      </div>

    </div>

  </div>

  <script>
    const selectedChar =
      localStorage.getItem('selectedCharacter') || '1';

    document.getElementById('perso').src =
      `assets/personnage${selectedChar}.png`;
  </script>

</body>
</html>
